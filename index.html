<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipLinks</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f5f5f5; }
.navbar { background: white; border-bottom: 1px solid #eee; padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 18px; font-weight: bold; color: #185FA5; }
.badge { background: #E6F1FB; color: #185FA5; font-size: 12px; padding: 3px 10px; border-radius: 6px; }
.hero { text-align: center; padding: 3rem 1rem 2rem; }
.hero h1 { font-size: 26px; color: #111; margin-bottom: 8px; }
.hero p { font-size: 15px; color: #666; }
.card { background: white; border: 1px solid #eee; border-radius: 12px; padding: 1.5rem; max-width: 560px; margin: 0 auto 1.5rem; }
.input-group { display: flex; gap: 8px; margin-bottom: 1rem; }
.input-group input { flex: 1; height: 42px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; padding: 0 12px; outline: none; }
.btn { height: 42px; padding: 0 20px; border: none; border-radius: 8px; background: #185FA5; color: white; font-size: 14px; font-weight: bold; cursor: pointer; }
.btn:hover { background: #0C447C; }
.btn:disabled { background: #ccc; cursor: not-allowed; }
.info { font-size: 13px; color: #888; }
.error { display: none; background: #FCEBEB; border: 1px solid #F7C1C1; border-radius: 8px; padding: 12px; font-size: 14px; color: #A32D2D; margin-top: 1rem; }
.loading { display: none; text-align: center; padding: 1.5rem; }
.spinner { width: 28px; height: 28px; border: 3px solid #eee; border-top-color: #185FA5; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.result-card { display: none; background: white; border: 1px solid #eee; border-radius: 12px; padding: 1.5rem; max-width: 560px; margin: 0 auto 1.5rem; }
.result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.result-title { font-size: 14px; font-weight: bold; color: #111; }
.btn-copy { height: 34px; padding: 0 14px; border: 1px solid #ddd; border-radius: 8px; background: white; font-size: 13px; cursor: pointer; }
.btn-copy:hover { background: #f5f5f5; }
textarea { width: 100%; min-height: 220px; padding: 12px; font-size: 13px; font-family: monospace; border: 1px solid #eee; border-radius: 8px; background: #f9f9f9; resize: vertical; outline: none; line-height: 1.8; }
.footer { text-align: center; padding: 1.5rem; font-size: 12px; color: #aaa; border-top: 1px solid #eee; margin-top: 1rem; }
</style>
</head>
<body>
<nav class="navbar">
  <div class="logo">ClipLinks</div>
  <span class="badge">Beta</span>
</nav>
<div class="hero">
  <h1>Saca los links de cualquier perfil de TikTok</h1>
  <p>Pega el usuario y obtén los 25 links más recientes listos para copiar.</p>
</div>
<div class="card">
  <div class="input-group">
    <input type="text" id="userInput" placeholder="@usuario de TikTok..." />
    <button class="btn" id="fetchBtn" onclick="fetchLinks()">Obtener links</button>
  </div>
  <div class="info">Saca los <strong>25 videos más recientes</strong> listos para pegar</div>
  <div class="error" id="errorBox"></div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="font-size:13px;color:#888;">Buscando los últimos videos...</p>
  </div>
</div>
<div class="result-card" id="resultCard">
  <div class="result-header">
    <span class="result-title" id="resultTitle">Links obtenidos</span>
    <button class="btn-copy" onclick="copyLinks()">Copiar todo</button>
  </div>
  <textarea id="outputArea" readonly></textarea>
</div>
<div class="footer">ClipLinks — Hecho para cliperos</div>
<script>
const API = 'https://web-production-db182.up.railway.app';
document.getElementById('userInput').addEventListener('keydown', e => { if(e.key==='Enter') fetchLinks(); });
async function fetchLinks() {
  let user = document.getElementById('userInput').value.trim().replace('@','');
  if(!user) { showError('Escribe un usuario de TikTok'); return; }
  document.getElementById('errorBox').style.display='none';
  document.getElementById('resultCard').style.display='none';
  document.getElementById('loading').style.display='block';
  document.getElementById('fetchBtn').disabled=true;
  try {
    const res = await fetch(`${API}/links?user=${encodeURIComponent(user)}&count=25`);
    const data = await res.json();
    if(!res.ok||data.error) throw new Error(data.error||'Error');
    const formatted = data.links.map(l=>l+',').join('\n');
    document.getElementById('outputArea').value=formatted;
    document.getElementById('resultTitle').textContent=`@${user} — ${data.links.length} links más recientes`;
    document.getElementById('resultCard').style.display='block';
  } catch(err) {
    showError('No se pudieron obtener los links. Comprueba que el usuario existe y es público.');
  } finally {
    document.getElementById('loading').style.display='none';
    document.getElementById('fetchBtn').disabled=false;
  }
}
async function copyLinks() {
  try { await navigator.clipboard.writeText(document.getElementById('outputArea').value); alert('¡Links copiados!'); }
  catch { document.getElementById('outputArea').select(); }
}
function showError(msg) { const e=document.getElementById('errorBox'); e.textContent=msg; e.style.display='block'; }
</script>
</body>
</html>
