<script>
var API='https://web-production-db182.up.railway.app';
var count=25,group=10,platform='tiktok';
var lang=navigator.language.indexOf('en')===0?'en':'es';
var PH={es:{tiktok:'@usuario de TikTok',instagram:'@usuario de Instagram',youtube:'@canal de YouTube'},en:{tiktok:'@TikTok username',instagram:'@Instagram username',youtube:'@YouTube channel'}};

// ===== LOGIN DE GOOGLE =====
var GOOGLE_CLIENT_ID = "443136299093-nf63uj2112a5h9hiknmksot6veldl5na.apps.googleusercontent.com";

function parseJwt(token){
  try{
    var base=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    var json=decodeURIComponent(atob(base).split('').map(function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);}).join(''));
    return JSON.parse(json);
  }catch(e){return null;}
}
function handleCredential(resp){
  var d=parseJwt(resp.credential);
  if(!d)return;
  try{localStorage.setItem('clipuser',JSON.stringify({name:d.name,picture:d.picture,email:d.email}));}catch(e){}
  renderAuth();
}
function logout(){
  try{localStorage.removeItem('clipuser');}catch(e){}
  if(window.google&&google.accounts&&google.accounts.id){google.accounts.id.disableAutoSelect();}
  renderAuth();
}
function needClientId(){alert(lang==='es'?'Para activar el login con Google tienes que añadir tu Client ID en el código (variable GOOGLE_CLIENT_ID).':'To enable Google login, add your Client ID in the code (GOOGLE_CLIENT_ID variable).');}
function renderAuth(){
  var area=document.getElementById('authArea');
  var raw=null; try{raw=localStorage.getItem('clipuser');}catch(e){}
  if(raw){
    var u=JSON.parse(raw);
    area.innerHTML='<div class="userpill"><img src="'+u.picture+'" referrerpolicy="no-referrer"><span>'+u.name+'</span><button onclick="logout()">'+(lang==='es'?'Salir':'Log out')+'</button></div>';
    return;
  }
  if(GOOGLE_CLIENT_ID){
    area.innerHTML='<div id="gbtn"></div>';
    if(window.google&&google.accounts&&google.accounts.id){
      google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:handleCredential});
      google.accounts.id.renderButton(document.getElementById('gbtn'),{theme:'filled_black',size:'medium',shape:'pill',text:'signin'});
    }
  } else {
    area.innerHTML='<button class="glogin" onclick="needClientId()"><svg width="16" height="16" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>'+(lang==='es'?'Iniciar sesión':'Sign in')+'</button>';
  }
}

function applyLang(){
  document.querySelectorAll('[data-es]').forEach(function(el){el.textContent=lang==='es'?el.getAttribute('data-es'):el.getAttribute('data-en');});
  document.getElementById('userInp').placeholder=PH[lang][platform];
  document.getElementById('langSel').value=lang;
  renderAuth();
}
function setLang(v){lang=v;applyLang();}
function setPlat(el,p){
  document.querySelectorAll('.plat').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');platform=p;
  document.getElementById('userInp').placeholder=PH[lang][p];
}
function setOpt(el,type,val){
  var id=type==='count'?'countOpts':'groupOpts';
  document.querySelectorAll('#'+id+' .opt').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  if(type==='count'){count=val;}else{group=val;}
}
document.getElementById('userInp').addEventListener('keydown',function(e){if(e.key==='Enter'){fetchLinks();}});
function fetchLinks(){
  var user=document.getElementById('userInp').value.trim().replace('@','');
  if(!user){return;}
  document.getElementById('resultBox').style.display='none';
  document.getElementById('warnBox').style.display='none';
  document.getElementById('loadBox').style.display='block';
  document.getElementById('loadMsg').textContent=lang==='es'?('Sacando los últimos '+count+' links de @'+user+' en grupos de '+group+'...'):('Getting the last '+count+' links from @'+user+' in groups of '+group+'...');
  fetch(API+'/links?user='+encodeURIComponent(user)+'&platform='+platform+'&count='+count)
  .then(function(res){return res.json();})
  .then(function(data){
    if(data.error){throw new Error(data.error);}
    if(data.links.length<count){
      var w=document.getElementById('warnBox');
      w.textContent=lang==='es'?('⚠️ Pediste '+count+' links pero salieron '+data.links.length+'. Prueba de nuevo si te faltan.'):('⚠️ You asked for '+count+' links but got '+data.links.length+'. Try again if some are missing.');
      w.style.display='block';
    }
    showResults(user,data.links,data.avatar);
  })
  .catch(function(){
    var w=document.getElementById('warnBox');
    w.textContent=lang==='es'?'No se pudieron obtener los links. Comprueba que el usuario existe y es público.':'Could not get links. Make sure the user exists and is public.';
    w.style.display='block';
  })
  .finally(function(){document.getElementById('loadBox').style.display='none';});
}
function showResults(user,links,avatar){
  var groups=[];
  for(var i=0;i<links.length;i+=group){groups.push(links.slice(i,i+group));}
  var ava=document.getElementById('rAva');
  if(avatar){ ava.innerHTML='<img src="'+avatar+'" referrerpolicy="no-referrer" onerror="this.parentNode.textContent=\''+user.charAt(0).toUpperCase()+'\'">'; }
  else { ava.textContent=user.charAt(0).toUpperCase(); }
  document.getElementById('rName').textContent='@'+user;
  document.getElementById('rMeta').textContent=links.length+' links — '+groups.length+(lang==='es'?' grupos de ':' groups of ')+group;
  var area=document.getElementById('grpsArea');
  area.innerHTML='';
  groups.forEach(function(g,gi){
    var div=document.createElement('div');
    div.className='grp';
    div.style.animationDelay=Math.min(gi*0.05,1.2)+'s';
    var list='';
    g.forEach(function(l,i){
      list+='<div class="lk" id="lk-'+gi+'-'+i+'">'+l+(i<g.length-1?',':'')+'</div>';
    });
    var gLabel=(lang==='es'?'Grupo ':'Group ')+(gi+1)+' — '+g.length+' links';
    var cLabel=lang==='es'?'Copiar':'Copy';
    div.innerHTML='<div class="grp-head"><span class="grp-t">'+gLabel+'</span><button class="grp-btn" id="gb-'+gi+'" onclick="copyGroup('+gi+')">'+cLabel+'</button></div><div class="lks">'+list+'</div>';
    area.appendChild(div);
  });
  document.getElementById('resultBox').style.display='block';
}
function copyGroup(gi){
  var rows=document.querySelectorAll('[id^="lk-'+gi+'-"]');
  var text=Array.prototype.map.call(rows,function(r){return r.textContent;}).join('\n');
  navigator.clipboard.writeText(text).then(function(){
    var btn=document.getElementById('gb-'+gi);
    btn.classList.remove('ok'); void btn.offsetWidth;
    btn.textContent=lang==='es'?'✓ Copiado':'✓ Copied';
    btn.classList.add('ok');
    rows.forEach(function(r){r.classList.remove('ok'); void r.offsetWidth; r.classList.add('ok');});
  });
}
function copyAll(){
  var rows=document.querySelectorAll('.lk');
  var text=Array.prototype.map.call(rows,function(r){return r.textContent;}).join('\n');
  navigator.clipboard.writeText(text).then(function(){
    rows.forEach(function(r){r.classList.remove('ok'); void r.offsetWidth; r.classList.add('ok');});
    document.querySelectorAll('.grp-btn').forEach(function(b){b.textContent='✓';b.classList.add('ok');});
    var ca=document.querySelector('.copyall');
    ca.classList.remove('ok'); void ca.offsetWidth; ca.classList.add('ok');
  });
}
window.addEventListener('load', renderAuth);
applyLang();
</script>
