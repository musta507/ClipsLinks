<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipLinks</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #F5F5F7; }
.navbar { background: rgba(255,255,255,0.85); border-bottom: 1px solid #E8E8ED; padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 17px; font-weight: 500; color: #1D1D1F; display: flex; align-items: center; gap: 8px; }
.logo-dot { width: 9px; height: 9px; border-radius: 50%; background: #0071E3; }
.nav-right { display: flex; align-items: center; gap: 10px; }
.nav-badge { background: #E8F1FD; color: #0071E3; font-size: 11px; padding: 3px 10px; border-radius: 20px; }
.lang-btn { background: transparent; color: #86868B; font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 1px solid #E8E8ED; cursor: pointer; }
.hero { text-align: center; padding: 3rem 1rem 2rem; }
.hero h1 { font-size: 32px; font-weight: 500; color: #1D1D1F; margin-bottom: 8px; letter-spacing: -0.5px; }
.hero p { font-size: 15px; color: #86868B; }
.main { max-width: 580px; margin: 0 auto; padding: 0 1rem 3rem; }
.card { background: #fff; border: 1px solid #E8E8ED; border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
.plats { display: flex; gap: 6px; margin-bottom: 1.2rem; background: #F5F5F7; border-radius: 12px; padding: 4px; }
.plat { flex: 1; height: 36px; border: none; border-radius: 9px; background: transparent; color: #86868B; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
.plat.active { background: #fff; color: #1D1D1F; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.inp { width: 100%; height: 48px; border: 1px solid #E8E8ED; border-radius: 12px; padding: 0 16px; font-size: 15px; outline: none; color: #1D1D1F; margin-bottom: 1rem; background: #FAFAFA; }
.inp::placeholder { color: #C7C7CC; }
.inp:focus { border-color: #0071E3; background: #fff; box-shadow: 0 0 0 3px rgba(0,113,227,0.08); }
.period-label { font-size: 12px; color: #86868B; margin-bottom: 8px; }
.periods { display: flex; gap: 6px; flex-wrap: wrap; }
.period { height: 32px; padding: 0 14px; border: 1px solid #E8E8ED; border-radius: 20px; background: #fff; color: #86868B; font-size: 12px; cursor: pointer; }
.period.active { background: #E8F1FD; color: #0071E3; border-color: #B8D4F8; }
.date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
.date-group label { font-size: 11px; color: #86868B; margin-bottom: 4px; display: block; }
.date-group input[type="date"] { width: 100%; height: 38px; font-size: 13px; border: 1px solid #E8E8ED; border-radius: 10px; padding: 0 10px; background: #FAFAFA; color: #1D1D1F; outline: none; }
.btn { width: 100%; height: 48px; border: none; border-radius: 12px; background: #0071E3; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 1rem; }
.btn:hover { background: #0077ED; }
.btn:disabled { background: #C7C7CC; cursor: not-allowed; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1rem; }
.stat { background: #fff; border: 1px solid #E8E8ED; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.03); }
.stat .val { font-size: 22px; font-weight: 500; color: #0071E3; }
.stat .lbl { font-size: 11px; color: #86868B; margin-top: 2px; }
.result-card { background: #fff; border: 1px solid #E8E8ED; border-radius: 20px; overflow: hidden; margin-bottom: 1rem; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
.result-header { background: #F5F5F7; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #E8E8ED; }
.result-info span { font-size: 13px; font-weight: 500; color: #1D1D1F; }
.result-info small { font-size: 11px; color: #86868B; display: block; margin-top: 2px; }
.btn-copy-all { height: 30px; padding: 0 14px; border: 1px solid #B8D4F8; border-radius: 8px; background: #E8F1FD; color: #0071E3; font-size: 12px; cursor: pointer; }
.btn-copy-all:hover { background: #D1E8FB; }
.group-wrap { padding: 12px 16px; border-bottom: 1px solid #F5F5F7; }
.group-wrap:last-child { border-bottom: none; }
.group-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.group-label span { font-size: 12px; color: #86868B; }
.btn-copy-group { height: 26px; padding: 0 10px; border: 1px solid #E8E8ED; border-radius: 6px; background: #fff; color: #86868B; font-size: 11px; cursor: pointer; }
.btn-copy-group:hover { border-color: #0071E3; color: #0071E3; }
.links-list { display: flex; flex-direction: column; gap: 3px; }
.link-item { font-size: 13px; color: #1D1D1F; padding: 5px 8px; background: #F5F5F7; border-radius: 8px; line-height: 1.4; }
.loading { display: none; text-align: center; padding: 2rem; }
.spinner { width: 28px; height: 28px; border: 3px solid #E8E8ED; border-top-color: #0071E3; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { display: none; background: #FFF2F2; border: 1px solid #FFD1D1; border-radius: 12px; padding: 12px; font-size: 13px; color: #D70015; margin-bottom: 1rem; }
.toast { background: #1D1D1F; color: #fff; border-radius: 12px; padding: 10px 16px; font-size: 13px; text-align: center; margin-bottom: 1rem; display: none; }
.footer { text-align: center; padding: 1.5rem; font-size: 12px; color: #C7C7CC; }
</style>
</head>
<body>
<nav class="navbar">
  <div class="logo"><div class="logo-dot"></div> ClipLinks</div>
  <div class="nav-right">
    <span class="nav-badge">Beta</span>
    <button class="lang-btn" onclick="toggleLang()">🌍 EN</button>
  </div>
</nav>
<div class="hero">
  <h1 id="heroTitle">Saca los links de cualquier perfil</h1>
  <p id="heroSub">TikTok, Instagram y YouTube — grupos de 25, listos para copiar.</p>
</div>
<div class="main">
  <div class="card">
    <div class="plats">
      <button class="plat active" onclick="setTab(this,'tiktok')">TikTok</button>
      <button class="plat" onclick="setTab(this,'instagram')">Instagram</button>
      <button class="plat" onclick="setTab(this,'youtube')">YouTube</button>
    </div>
    <input class="inp" type="text" id="userInput" placeholder="@usuario de TikTok..." autocomplete="off" />
    <div class="period-label">¿De qué periodo quieres los links?</div>
    <div class="periods">
      <button class="period active" onclick="setPeriod(this,'today')">Hoy</button>
      <button class="period" onclick="setPeriod(this,'2days')">2 días</button>
      <button class="period" onclick="setPeriod(this,'7days')">7 días</button>
      <button class="period" onclick="setPeriod(this,'30days')">30 días</button>
      <button class="period" onclick="setPeriod(this,'custom')">📅 Fechas</button>
    </div>
    <div class="date-row" id="dateRow" style="display:none">
      <div class="date-group"><label>Desde</label><input type="date" id="dateFrom" /></div>
      <div class="date-group"><label>Hasta</label><input type="date" id="dateTo" /></div>
    </div>
    <button class="btn" id="fetchBtn" onclick="fetchLinks()">Obtener links</button>
  </div>
  <div class="toast" id="toast"></div>
  <div class="error" id="errorBox"></div>
  <div class="loading" id="loading"><div class="spinner"></div><p style="font-size:13px;color:#86868B">Buscando videos... puede tardar unos segundos</p></div>
  <div class="stats" id="statsRow" style="display:none">
    <div class="stat"><div class="val" id="statTotal">0</div><div class="lbl">Links totales</div></div>
    <div class="stat"><div class="val" id="statGroups">0</div><div class="lbl">Grupos</div></div>
    <div class="stat"><div class="val" id="statUser">—</div><div class="lbl">Usuario</div></div>
  </div>
  <div id="resultsArea"></div>
  <div class="footer">ClipLinks — Hecho para cliperos</div>
</div>
<script>
const API = 'https://web-production-db182.up.railway.app';
let currentPlatform = 'tiktok';
let selectedPeriod = 'today';
let lang = navigator.language.startsWith('en') ? 'en' : 'es';

function setTab(el, platform) {
  document.querySelectorAll('.plat').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentPlatform = platform;
  const ph = { tiktok: '@usuario de TikTok...', instagram: '@usuario de Instagram...', youtube: '@canal de YouTube...' };
  document.getElementById('userInput').placeholder = ph[platform];
}

function setPeriod(el, period) {
  document.querySelectorAll('.period').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedPeriod = period;
  document.getElementById('dateRow').style.display = period === 'custom' ? 'grid' : 'none';
}

function toggleLang() {
  lang = lang === 'es' ? 'en' : 'es';
  document.querySelector('.lang-btn').textContent = lang === 'es' ? '🌍 EN' : '🌍 ES';
  document.getElementById('heroTitle').textContent = lang === 'es' ? 'Saca los links de cualquier perfil' : 'Get links from any profile';
  document.getElementById('heroSub').textContent = lang === 'es' ? 'TikTok, Instagram y YouTube — grupos de 25, listos para copiar.' : 'TikTok, Instagram and YouTube — groups of 25, ready to copy.';
}

function getDateRange() {
  const today = new Date();
  const fmt = d => d.toISOString().split('T')[0];
  if(selectedPeriod === 'custom') {
    return { from: document.getElementById('dateFrom').value, to: document.getElementById('dateTo').value };
  }
  const days = { today: 1, '2days': 2, '7days': 7, '30days': 30 };
  const from = new Date();
  from.setDate(from.getDate() - (days[selectedPeriod] - 1));
  return { from: fmt(from), to: fmt(today) };
}

document.getElementById('userInput').addEventListener('keydown', e => { if(e.key==='Enter') fetchLinks(); });

async function fetchLinks() {
  const user = document.getElementById('userInput').value.trim().replace('@','');
  if(!user) { showError('Escribe un usuario'); return; }
  hideError();
  document.getElementById('resultsArea').innerHTML = '';
  document.getElementById('statsRow').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('fetchBtn').disabled = true;
  const { from, to } = getDateRange();
  try {
    const res = await fetch(`${API}/links?user=${encodeURIComponent(user)}&platform=${currentPlatform}&date_from=${from}&date_to=${to}`);
    const data = await res.json();
    if(!res.ok || data.error) throw new Error(data.error || 'Error');
    showResults(user, data.links);
  } catch(err) {
    showError('No se pudieron obtener los links. Comprueba que el usuario existe y es público.');
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('fetchBtn').disabled = false;
  }
}

function showResults(user, links) {
  const groups = [];
  for(let i=0; i<links.length; i+=25) groups.push(links.slice(i,i+25));
  document.getElementById('statTotal').textContent = links.length;
  document.getElementById('statGroups').textContent = groups.length;
  document.getElementById('statUser').textContent = '@'+user;
  document.getElementById('statsRow').style.display = 'grid';
  const area = document.getElementById('resultsArea');
  area.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'result-card';
  const header = document.createElement('div');
  header.className = 'result-header';
  header.innerHTML = `<div class="result-info"><span>@${user}</span><small>${links.length} links — ${groups.length} grupos</small></div><button class="btn-copy-all" onclick="copyAll()">Copiar todo</button>`;
  card.appendChild(header);
  groups.forEach((group, gi) => {
    const formatted = group.map((l,i) => i < group.length-1 ? l+',' : l).join('\n');
    const wrap = document.createElement('div');
    wrap.className = 'group-wrap';
    const list = group.map((l,i) => `<div class="link-item">${l}${i < group.length-1 ? ',' : ''}</div>`).join('');
    wrap.innerHTML = `<div class="group-label"><span>Grupo ${gi+1} — ${group.length} links</span><button class="btn-copy-group" onclick="copyGroup(${gi})">Copiar grupo ${gi+1}</button></div><div class="links-list" id="links${gi}">${list}</div>`;
    card.appendChild(wrap);
  });
  area.appendChild(card);
}

function copyGroup(i) {
  const items = document.querySelectorAll(`#links${i} .link-item`);
  const text = Array.from(items).map(item => item.textContent).join('\n');
  navigator.clipboard.writeText(text).then(()=>showToast(`Grupo ${i+1} copiado!`)).catch(()=>{});
}

function copyAll() {
  const items = document.querySelectorAll('.link-item');
  const text = Array.from(items).map(i=>i.textContent).join('\n');
  navigator.clipboard.writeText(text).then(()=>showToast('¡Links copiados!')).catch(()=>{});
}

function showError(msg) { const e=document.getElementById('errorBox'); e.textContent=msg; e.style.display='block'; }
function hideError() { document.getElementById('errorBox').style.display='none'; }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2500); }
</script>
</body>
</html>
