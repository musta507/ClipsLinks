<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipLinks</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #F5F5F7; }
.navbar { background: rgba(255,255,255,0.85); border-bottom: 1px solid #E8E8ED; padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-size: 17px; font-weight: 500; color: #1D1D1F; display: flex; align-items: center; gap: 8px; }
.logo-dot { width: 9px; height: 9px; border-radius: 50%; background: #0071E3; }
.nav-right { display: flex; align-items: center; gap: 10px; }
.lang-select { font-size: 12px; color: #86868B; padding: 4px 8px; border-radius: 8px; border: 1px solid #E8E8ED; background: #fff; cursor: pointer; outline: none; }
.hero { text-align: center; padding: 3rem 1rem 2rem; }
.hero h1 { font-size: 32px; font-weight: 500; color: #1D1D1F; margin-bottom: 8px; letter-spacing: -0.5px; }
.hero p { font-size: 15px; color: #86868B; }
.main { max-width: 580px; margin: 0 auto; padding: 0 1rem 3rem; }
.card { background: #fff; border: 1px solid #E8E8ED; border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
.plats { display: flex; gap: 6px; margin-bottom: 1.2rem; background: #F5F5F7; border-radius: 12px; padding: 4px; }
.plat { flex: 1; height: 36px; border: none; border-radius: 9px; background: transparent; color: #86868B; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
.plat.active { background: #fff; color: #1D1D1F; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.inp { width: 100%; height: 48px; border: 1px solid #E8E8ED; border-radius: 12px; padding: 0 16px; font-size: 15px; outline: none; color: #1D1D1F; margin-bottom: 1rem; background: #FAFAFA; }
.inp::placeholder { color: #C7C7CC; }
.inp:focus { border-color: #0071E3; background: #fff; box-shadow: 0 0 0 3px rgba(0,113,227,0.08); }
.section-label { font-size: 12px; color: #86868B; margin-bottom: 8px; }
.options-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.opt-btn { height: 32px; padding: 0 14px; border: 1px solid #E8E8ED; border-radius: 20px; background: #fff; color: #86868B; font-size: 12px; cursor: pointer; }
.opt-btn.active { background: #E8F1FD; color: #0071E3; border-color: #B8D4F8; }
.btn { width: 100%; height: 48px; border: none; border-radius: 12px; background: #0071E3; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; }
.btn:hover { background: #0077ED; }
.btn:disabled { background: #C7C7CC; cursor: not-allowed; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1rem; }
.stat { background: #fff; border: 1px solid #E8E8ED; border-radius: 12px; padding: 10px; text-align: center; }
.stat .val { font-size: 22px; font-weight: 500; color: #0071E3; }
.stat .lbl { font-size: 11px; color: #86868B; margin-top: 2px; }
.result-card { background: #fff; border: 1px solid #E8E8ED; border-radius: 20px; overflow: hidden; margin-bottom: 1rem; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
.result-header { background: #F5F5F7; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #E8E8ED; }
.result-info span { font-size: 13px; font-weight: 500; color: #1D1D1F; }
.result-info small { font-size: 11px; color: #86868B; display: block; margin-top: 2px; }
.btn-copy-all { height: 30px; padding: 0 14px; border: 1px solid #B8D4F8; border-radius: 8px; background: #E8F1FD; color: #0071E3; font-size: 12px; cursor: pointer; }
.btn-copy-all:hover { background: #D1E8FB; }
.group-wrap { padding: 12px 16px; border-bottom: 1px solid #F5F5F7; }
.group-wrap:last-child { border-bottom: none; }
.group-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.group-label span { font-size: 12px; color: #86868B; }
.btn-copy-group { height: 26px; padding: 0 10px; border: 1px solid #E8E8ED; border-radius: 6px; background: #fff; color: #86868B; font-size: 11px; cursor: pointer; }
.btn-copy-group:hover { border-color: #0071E3; color: #0071E3; }
.links-list { display: flex; flex-direction: column; gap: 3px; }
.link-item { font-size: 13px; color: #1D1D1F; padding: 5px 8px; background: #F5F5F7; border-radius: 8px; line-height: 1.4; }
.loading { display: none; text-align: center; padding: 2rem; }
.spinner { width: 28px; height: 28px; border: 3px solid #E8E8ED; border-top-color: #0071E3; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { display: none; background: #FFF2F2; border: 1px solid #FFD1D1; border-radius: 12px; padding: 12px; font-size: 13px; color: #D70015; margin-bottom: 1rem; }
.toast { background: #1D1D1F; color: #fff; border-radius: 12px; padding: 10px 16px; font-size: 13px; text-align: center; margin-bottom: 1rem; display: none; }
.footer { text-align: center; padding: 1.5rem; font-size: 12px; color: #C7C7CC; }
</style>
</head>
<body>
<nav class="navbar">
  <div class="logo"><div class="logo-dot"></div> ClipLinks</div>
  <div class="nav-right">
    <select class="lang-select" onchange="setLang(this.value)">
      <option value="es">🌍 Español</option>
      <option value="en">🌍 English</option>
    </select>
  </div>
</nav>
<div class="hero">
  <h1 id="heroTitle">Saca los links de cualquier perfil</h1>
  <p id="heroSub">TikTok, Instagram y YouTube — grupos personalizados, listos para copiar.</p>
</div>
<div class="main">
  <div class="card">
    <div class="plats">
      <button class="plat active" onclick="setTab(this,'tiktok')">TikTok</button>
      <button class="plat" onclick="setTab(this,'instagram')">Instagram</button>
      <button class="plat" onclick="setTab(this,'youtube')">YouTube</button>
    </div>
    <input class="inp" type="text" id="userInput" placeholder="@usuario de TikTok..." autocomplete="off" />
    <div class="section-label" id="lblCount">¿Cuántos links quieres sacar?</div>
    <div class="options-row" id="countRow">
<button class="opt-btn active" onclick="setCount(this,25)">Últimos 25</button>
<button class="opt-btn" onclick="setCount(this,50)">Últimos 50 links</button>
<button class="opt-btn" onclick="setCount(this,100)">Últimos 100 links</button>
<button class="opt-btn" onclick="setCount(this,200)">Últimos 200 links</button>
<button class="opt-btn" onclick="setCount(this,500)">Últimos 500 links</button>
<button class="opt-btn" onclick="setCount(this,1000)">Últimos 1000 links</button>
    </div>
    <div class="section-label" id="lblGroup">¿De cuántos links cada grupo?</div>
    <div class="options-row" id="groupRow">
      <button class="opt-btn active" onclick="setGroup(this,10)">10</button>
      <button class="opt-btn" onclick="setGroup(this,25)">25</button>
      <button class="opt-btn" onclick="setGroup(this,50)">50</button>
      <button class="opt-btn" onclick="setGroup(this,100)">100</button>
    </div>
    <button class="btn" id="fetchBtn" onclick="fetchLinks()" style="margin-top:1rem">Obtener links</button>
  </div>
  <div class="toast" id="toast"></div>
  <div class="error" id="errorBox"></div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p id="loadingText" style="font-size:13px;color:#86868B">Buscando videos...</p>
  </div>
  <div class="stats" id="statsRow" style="display:none">
    <div class="stat"><div class="val" id="statTotal">0</div><div class="lbl" id="lblTotal">Links totales</div></div>
    <div class="stat"><div class="val" id="statGroups">0</div><div class="lbl" id="lblGroups">Grupos</div></div>
    <div class="stat"><div class="val" id="statUser">—</div><div class="lbl" id="lblUser">Usuario</div></div>
  </div>
  <div id="resultsArea"></div>
  <div class="footer" id="footer">ClipLinks — Hecho para cliperos</div>
</div>
<script>
const API = 'https://web-production-db182.up.railway.app';
let currentPlatform = 'tiktok';
let selectedCount = 25;
let selectedGroup = 10;
let lang = navigator.language.startsWith('en') ? 'en' : 'es';

const T = {
  es: {
    heroTitle: 'Saca los links de cualquier perfil',
    heroSub: 'TikTok, Instagram y YouTube — grupos personalizados, listos para copiar.',
    placeholder: { tiktok: '@usuario de TikTok...', instagram: '@usuario de Instagram...', youtube: '@canal de YouTube...' },
    lblCount: '¿Cuántos links quieres sacar?',
    lblGroup: '¿De cuántos links cada grupo?',
    btnGet: 'Obtener links',
    loading: 'Buscando videos...',
    lblTotal: 'Links totales', lblGroups: 'Grupos', lblUser: 'Usuario',
    copyAll: 'Copiar todo', copyGroup: 'Copiar grupo',
    footer: 'ClipLinks — Hecho para cliperos',
    toastCopied: '¡Copiado!', toastAll: '¡Links copiados!',
    error: 'No se pudieron obtener los links. Comprueba que el usuario existe y es público.',
    groupLabel: 'Grupo', linksLabel: 'links'
  },
  en: {
    heroTitle: 'Get links from any profile',
    heroSub: 'TikTok, Instagram and YouTube — custom groups, ready to copy.',
    placeholder: { tiktok: '@TikTok username...', instagram: '@Instagram username...', youtube: '@YouTube channel...' },
    lblCount: 'How many links do you want?',
    lblGroup: 'How many links per group?',
    btnGet: 'Get links',
    loading: 'Searching videos...',
    lblTotal: 'Total links', lblGroups: 'Groups', lblUser: 'User',
    copyAll: 'Copy all', copyGroup: 'Copy group',
    footer: 'ClipLinks — Made for clippers',
    toastCopied: 'Copied!', toastAll: 'All links copied!',
    error: 'Could not get links. Make sure the user exists and is public.',
    groupLabel: 'Group', linksLabel: 'links'
  }
};

function applyLang() {
  const t = T[lang];
  document.getElementById('heroTitle').textContent = t.heroTitle;
  document.getElementById('heroSub').textContent = t.heroSub;
  document.getElementById('userInput').placeholder = t.placeholder[currentPlatform];
  document.getElementById('lblCount').textContent = t.lblCount;
  document.getElementById('lblGroup').textContent = t.lblGroup;
  document.getElementById('fetchBtn').textContent = t.btnGet;
  document.getElementById('loadingText').textContent = t.loading;
  document.getElementById('lblTotal').textContent = t.lblTotal;
  document.getElementById('lblGroups').textContent = t.lblGroups;
  document.getElementById('lblUser').textContent = t.lblUser;
  document.getElementById('footer').textContent = t.footer;
  document.querySelector('.lang-select').value = lang;
}

function setLang(l) { lang = l; applyLang(); }

function setTab(el, platform) {
  document.querySelectorAll('.plat').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentPlatform = platform;
  document.getElementById('userInput').placeholder = T[lang].placeholder[platform];
}

function setCount(el, count) {
  document.querySelectorAll('#countRow .opt-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedCount = count;
}

function setGroup(el, size) {
  document.querySelectorAll('#groupRow .opt-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedGroup = size;
}

document.getElementById('userInput').addEventListener('keydown', e => { if(e.key==='Enter') fetchLinks(); });

async function fetchLinks() {
  const user = document.getElementById('userInput').value.trim().replace('@','');
  if(!user) { showError(T[lang].error); return; }
  hideError();
  document.getElementById('resultsArea').innerHTML = '';
  document.getElementById('statsRow').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('fetchBtn').disabled = true;
  try {
    const res = await fetch(`${API}/links?user=${encodeURIComponent(user)}&platform=${currentPlatform}&count=${selectedCount}`);
    const data = await res.json();
    if(!res.ok || data.error) throw new Error(data.error || 'Error');
    showResults(user, data.links);
  } catch(err) {
    showError(T[lang].error);
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('fetchBtn').disabled = false;
  }
}

function showResults(user, links) {
  const t = T[lang];
  const groups = [];
  for(let i=0; i<links.length; i+=selectedGroup) groups.push(links.slice(i,i+selectedGroup));
  document.getElementById('statTotal').textContent = links.length;
  document.getElementById('statGroups').textContent = groups.length;
  document.getElementById('statUser').textContent = '@'+user;
  document.getElementById('statsRow').style.display = 'grid';
  const area = document.getElementById('resultsArea');
  area.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'result-card';
  const header = document.createElement('div');
  header.className = 'result-header';
  header.innerHTML = `<div class="result-info"><span>@${user}</span><small>${links.length} ${t.linksLabel} — ${groups.length} ${t.lblGroups.toLowerCase()}</small></div><button class="btn-copy-all" onclick="copyAll()">${t.copyAll}</button>`;
  card.appendChild(header);
  groups.forEach((group, gi) => {
    const wrap = document.createElement('div');
    wrap.className = 'group-wrap';
    const list = group.map((l,i) => `<div class="link-item">${l}${i < group.length-1 ? ',' : ''}</div>`).join('');
    wrap.innerHTML = `<div class="group-label"><span>${t.groupLabel} ${gi+1} — ${group.length} ${t.linksLabel}</span><button class="btn-copy-group" onclick="copyGroup(${gi})">${t.copyGroup} ${gi+1}</button></div><div class="links-list" id="links${gi}">${list}</div>`;
    card.appendChild(wrap);
  });
  area.appendChild(card);
}

function copyGroup(i) {
  const items = document.querySelectorAll(`#links${i} .link-item`);
  const text = Array.from(items).map(item => item.textContent).join('\n');
  navigator.clipboard.writeText(text).then(()=>showToast(T[lang].toastCopied)).catch(()=>{});
}

function copyAll() {
  const items = document.querySelectorAll('.link-item');
  const text = Array.from(items).map(i=>i.textContent).join('\n');
  navigator.clipboard.writeText(text).then(()=>showToast(T[lang].toastAll)).catch(()=>{});
}

function showError(msg) { const e=document.getElementById('errorBox'); e.textContent=msg; e.style.display='block'; }
function hideError() { document.getElementById('errorBox').style.display='none'; }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',2500); }

applyLang();
</script>
</body>
</html>
